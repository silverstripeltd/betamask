---
Name: betamask
Before: adminthemes
---

SilverStripe\Admin\LeftAndMain:
  extensions:
    - SilverStripe\Betamask\Extension\LeftAndMain
  admin_themes:
    - 'silverstripeltd/betamask:/templates'

---
Name: betamask_profile
---
# Force a full CMS reload when the Betamask theme toggle changes on profile save,
# so the theme assets (loaded only at LeftAndMain init) take effect immediately.
SilverStripe\Forms\FormRequestHandler:
  extensions:
    - SilverStripe\Betamask\Extension\ProfileFormReload

---
Name: betamask_featureflag
After: featureflag
---
# Features enable/disable by each CMS user
SilverStripe\FeatureFlag\Extension\MemberConfiguration:
  features:
    FeatureFlag_Betamask:
      Label: 'Betamask'
      Help: |
        Enabling this feature will change the CMS UI to preview the new look for Silverstripe CMS 6.
